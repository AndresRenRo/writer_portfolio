<style>
  :root{
    --paper:#FFF1E5;--paper-2:#FBE7D6;--paper-3:#F4D9C2;--ink:#1F1A16;--ink-soft:#544b41;
    --muted:#9a8f7e;--rule:#E7D4C2;--rule-2:#D8C0AA;--live:#2F7D5B;--maxw:1180px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--paper);color:var(--ink);font-family:'Newsreader',Georgia,serif;font-optical-sizing:auto;-webkit-font-smoothing:antialiased;line-height:1.58;text-rendering:optimizeLegibility}
  a{color:inherit;text-decoration:none}
  ::selection{background:var(--ink);color:var(--paper)}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 44px}
  .mono{font-family:'Space Mono',monospace}

  /* ---- top bar ---- */
  .topbar{border-bottom:1px solid var(--ink);background:var(--paper);position:sticky;top:0;z-index:50}
  .topbar .wrap{display:flex;justify-content:space-between;align-items:center;padding:12px 44px}
  .tb-name{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:700}
  .tb-right{display:flex;align-items:center;gap:14px}
  .lang-hint{font-family:'Space Mono',monospace;font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .langtoggle{display:inline-flex;border:1px solid var(--ink);border-radius:2px;overflow:hidden}
  .langbtn{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.05em;padding:6px 15px;background:none;border:0;cursor:pointer;color:var(--ink);transition:.15s}
  .langbtn.active{background:var(--ink);color:var(--paper)}

  /* ---- masthead ---- */
  .masthead{padding:72px 0 22px}
  .mh-kicker{font-family:'Space Mono',monospace;font-size:11.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--muted);margin-bottom:30px;display:flex;align-items:center;gap:16px}
  .mh-kicker::after{content:"";flex:1;height:1px;background:var(--rule)}
  .masthead h1{font-weight:200;font-size:clamp(60px,13vw,168px);line-height:.82;letter-spacing:-.045em}
  .masthead h1 em{font-style:italic;font-weight:300}
  .mh-grid{display:grid;grid-template-columns:1.45fr 1fr;gap:34px;align-items:end;margin-top:38px}
  .mh-lead{font-size:clamp(17px,2.2vw,23px);color:var(--ink-soft);line-height:1.46;max-width:40ch;font-weight:350}
  .mh-lead b{font-weight:600;color:var(--ink)}
  .mh-meta{font-family:'Space Mono',monospace;font-size:11px;line-height:2.1;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;text-align:right}
  .mh-meta span{color:var(--ink)}

  /* ---- ticker ---- */
  .ticker{border-top:2px solid var(--ink);border-bottom:1px solid var(--ink);overflow:hidden;background:var(--paper);margin-top:40px}
  .ticker-track{display:inline-block;white-space:nowrap;font-family:'Space Mono',monospace;font-size:11.5px;letter-spacing:.07em;text-transform:uppercase;padding:12px 0;will-change:transform;animation:scroll 54s linear infinite}
  .ticker:hover .ticker-track{animation-play-state:paused}
  .ticker-track b{font-weight:700}
  .ticker-track i{color:var(--rule-2);font-style:normal;padding:0 18px}
  @keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}

  /* ---- BIG category nav ---- */
  .indexbar{position:sticky;top:45px;z-index:40;background:var(--paper);border-bottom:1px solid var(--ink)}
  .indexbar .wrap{display:flex;gap:0;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;scroll-snap-type:x proximity;overscroll-behavior-x:contain}
  .indexbar .wrap::-webkit-scrollbar{display:none}
  .cat-btn{scroll-snap-align:start}
  .cat-btn{font-family:'Newsreader',serif;font-weight:420;font-size:clamp(17px,2vw,21px);letter-spacing:-.01em;color:var(--muted);background:none;border:0;cursor:pointer;padding:20px 30px 20px 0;position:relative;white-space:nowrap;display:flex;align-items:center;gap:12px;transition:color .18s}
  .cat-btn .dot{width:11px;height:11px;border-radius:50%;background:currentColor;opacity:.85;flex:none}
  .cat-btn[data-filter="all"] .dot{display:none}
  .cat-btn .csym{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--muted);opacity:0;transition:opacity .18s;margin-left:2px}
  .cat-btn:hover{color:var(--ink)}
  .cat-btn.active{color:var(--ink)}
  .cat-btn.active .csym{opacity:.7}
  .cat-btn.active::after{content:"";position:absolute;left:0;right:30px;bottom:-1px;height:4px;background:currentColor}

  /* ---- meta row ---- */
  .metarow{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;padding:26px 0 2px}
  .feednote{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.05em;color:var(--muted);text-transform:uppercase}
  .legend{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.04em;color:var(--muted);text-transform:uppercase;display:flex;gap:18px;align-items:center}
  .legend .lv{color:var(--live)}

  /* ---- feed ---- */
  .feed{padding:0 0 30px}
  .sec{padding-top:26px}
  .sec-head{display:flex;align-items:center;gap:16px;padding:18px 0 10px;border-bottom:2px solid var(--c);margin-bottom:2px}
  .sec-sym{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.1em;color:#fff;background:var(--c);padding:5px 10px;border-radius:3px}
  .sec-name{font-weight:300;font-size:clamp(32px,5.2vw,58px);letter-spacing:-.03em;line-height:.95}
  .sec-name em{font-style:italic;font-weight:400}
  .sec-count{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-left:auto}

  .entry{display:grid;grid-template-columns:54px 1fr auto;gap:6px 30px;align-items:start;width:100%;text-align:left;background:none;border:0;border-bottom:1px solid var(--rule);border-left:3px solid transparent;padding:30px 20px 30px 0;cursor:pointer;transition:background .22s,border-color .22s,padding-left .22s}
  .entry.live:hover{background:var(--paper-2);border-left-color:var(--c);padding-left:18px}
  .entry.byline{cursor:default}
  .entry.byline:hover{background:transparent}
  .entry-no{grid-column:1;font-family:'Space Mono',monospace;font-size:13px;color:var(--muted);padding-top:8px;letter-spacing:.02em}
  .entry-main{grid-column:2;min-width:0}
  .entry-kick{font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
  .entry-out{color:var(--c);font-weight:700}
  .entry-lang{color:var(--muted);border:1px solid var(--rule-2);padding:2px 7px;border-radius:2px;font-size:9.5px}
  .entry-status{color:var(--muted)}
  .entry-status.live{color:var(--live);font-weight:700}
  .entry h2{font-weight:400;font-size:clamp(22px,3vw,31px);line-height:1.12;letter-spacing:-.018em;transition:color .15s;max-width:32ch}
  .entry.live:hover h2{color:var(--c)}
  .entry .dek{font-size:clamp(14.5px,1.9vw,17px);color:var(--ink-soft);margin-top:10px;max-width:66ch;line-height:1.5;font-weight:350}
  .entry-cta{grid-column:3;align-self:center;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);white-space:nowrap;display:flex;align-items:center;gap:6px;transition:.15s}
  .entry-cta .arw{font-size:15px;transition:transform .2s}
  .entry.live:hover .entry-cta{color:var(--c)}
  .entry.live:hover .entry-cta .arw{transform:translate(2px,-2px)}
  .entry:focus-visible{outline:2px solid var(--ink);outline-offset:3px}

  .sec-more{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.03em;color:var(--c);padding:22px 0 10px 84px;display:flex;align-items:center;gap:10px;font-weight:700}
  .sec-more .pl{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border:1.5px solid var(--c);border-radius:50%;font-size:14px}

  .feed-foot{padding:50px 0 96px;border-top:2px solid var(--ink);margin-top:22px;display:flex;flex-wrap:wrap;gap:26px 40px;justify-content:space-between;align-items:flex-end}
  .feed-foot .blurb{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);line-height:1.85;max-width:56ch;letter-spacing:.02em}
  .feed-foot .links{font-family:'Space Mono',monospace;font-size:13px;display:flex;flex-direction:column;gap:10px;text-align:right}
  .feed-foot .links a{border-bottom:1px solid var(--rule-2);padding-bottom:2px;transition:border-color .15s}
  .feed-foot .links a:hover{border-color:var(--ink)}
  :focus-visible{outline:2px solid var(--ink);outline-offset:3px}

  @media (max-width:1024px){ .wrap,.topbar .wrap{padding-left:32px;padding-right:32px} }

    .mh-grid{grid-template-columns:1fr;gap:18px}

    .cat-btn{font-size:18px;padding:16px 22px 16px 0}
    .sec-name{font-size:clamp(30px,8vw,46px)}
    .entry{grid-template-columns:30px 1fr;gap:4px 16px;padding:24px 0}
    .entry h2{max-width:none}
    .entry .dek{max-width:none}
    .entry-cta{grid-column:2;align-self:start;margin-top:12px}
    .sec-more{padding-left:46px}
  }
  @media (max-width:600px){
    .wrap,.topbar .wrap{padding-left:18px;padding-right:18px}

    .lang-hint{display:none}
    .cat-btn{font-size:17px;gap:9px;padding:15px 20px 15px 0}
    .metarow{flex-direction:column;align-items:flex-start;gap:6px}
    .feed-foot{flex-direction:column;align-items:flex-start}
    .feed-foot .links{text-align:left}
  }
  @media (max-width:380px){
    .wrap,.topbar .wrap{padding-left:14px;padding-right:14px}
    .masthead h1{font-size:clamp(44px,15vw,60px)}
    .cat-btn{padding-right:16px;font-size:16px}
    .entry{grid-template-columns:1fr;padding:22px 0}
    .entry-no{display:none}.entry-main{grid-column:1}.entry-cta{grid-column:1}
    .sec-more{padding-left:0}
  }
  @media (prefers-reduced-motion:reduce){
    html{scroll-behavior:auto}.ticker-track{animation:none}
    .entry,.entry:hover{transition:none}*{transition:none!important}
  }
</style>

  var catBar=document.getElementById('catBar');
  var feed=document.getElementById('feed');
  var feednote=document.getElementById('feednote');
  var legend=document.getElementById('legend');
  var ticker=document.getElementById('ticker');
  var filter='all';
  var ORDER=Object.keys(CATS);

  function matchLang(clip){ return clip.lang==='EN/ES' || clip.lang===(LANG==='en'?'EN':'ES'); }
  function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function pad(n){return (n<10?'0':'')+n;}

  function buildTicker(){
    var one=T[LANG].ticker.map(function(s){return '<b>'+s+'</b>';}).join('<i>\u25C6</i>');
    ticker.innerHTML=one+'<i>\u25C6</i>'+one+'<i>\u25C6</i>';
  }
  function buildCats(){
    var html='<button class="cat-btn active" data-filter="all">'+T[LANG].all+'</button>';
    ORDER.forEach(function(key){var c=CATS[key];
      html+='<button class="cat-btn" data-filter="'+key+'" style="--c:'+c.color+'"><span class="dot" style="background:'+c.color+'"></span>'+c.label[LANG]+'<span class="csym">'+c.sym+'</span></button>';});
    catBar.innerHTML=html;
    Array.prototype.forEach.call(catBar.querySelectorAll('.cat-btn'),function(b){b.addEventListener('click',function(){setFilter(b.dataset.filter);});});
    syncCats();
  }
  function syncCats(){
    Array.prototype.forEach.call(catBar.querySelectorAll('.cat-btn'),function(b){var on=b.dataset.filter===filter;
      b.classList.toggle('active',on);
      b.style.color=(on&&b.dataset.filter!=='all')?CATS[b.dataset.filter].color:'';});
  }
  function setFilter(f){ filter=f; syncCats(); render();
    var a=catBar.querySelector('.cat-btn.active'); if(a&&a.scrollIntoView){a.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});} }

  // Keep the sticky category bar locked right below the top bar on every screen size
  var topbarEl=document.querySelector('.topbar');
  var indexbarEl=document.querySelector('.indexbar');
  function setStickyOffset(){ if(topbarEl&&indexbarEl){ indexbarEl.style.top=topbarEl.offsetHeight+'px'; } }
  window.addEventListener('resize',setStickyOffset);
  window.addEventListener('orientationchange',setStickyOffset);
  window.addEventListener('load',setStickyOffset);
  if(document.fonts&&document.fonts.ready){ document.fonts.ready.then(setStickyOffset); }
  setTimeout(setStickyOffset,300);

  function entryHTML(clip,c,n){
    var live=!!clip.url;
    var statusTxt=live?('\u25CF '+T[LANG].live):T[LANG].client;
    var statusCls=live?'entry-status live':'entry-status';
    var ctaHTML=live?'<div class="entry-cta">'+T[LANG].read+' <span class="arw">\u2197</span></div>':'';
    var open=live?'<a class="entry live" href="'+clip.url+'" target="_blank" rel="noopener" style="--c:'+c.color+'">':'<div class="entry byline" style="--c:'+c.color+'">';
    var close=live?'</a>':'</div>';
    return open+'<span class="entry-no">'+pad(n)+'</span>'+
      '<div class="entry-main"><div class="entry-kick"><span class="entry-out">'+esc(clip.outlet)+'</span>'+
      '<span class="entry-lang">'+clip.lang+'</span><span class="'+statusCls+'">'+statusTxt+'</span></div>'+
      '<h2>'+esc(clip.title)+'</h2><p class="dek">'+esc(clip.blurb)+'</p></div>'+
      ctaHTML+close;
  }
  function render(){
    var show=filter==='all'?ORDER:[filter];
    var html='',total=0,secs=0;
    show.forEach(function(key){
      var items=CLIPS.filter(function(c){return c.cat===key&&matchLang(c);});
      if(!items.length) return;
      total+=items.length; secs++;
      var c=CATS[key];
      var rows='';
      items.forEach(function(clip,i){ rows+=entryHTML(clip,c,i+1); });
      html+='<section class="sec" style="--c:'+c.color+'"><div class="sec-head"><span class="sec-sym">'+c.sym+'</span>'+
        '<h3 class="sec-name">'+c.label[LANG]+'</h3><span class="sec-count">'+items.length+' '+(items.length===1?T[LANG].piece:T[LANG].pieces)+'</span></div>'+
        rows+'<div class="sec-more"><span class="pl">+</span>'+c.more[LANG]+'</div></section>';
    });
    feed.innerHTML=html;
    var t=T[LANG];
    feednote.textContent = total+' '+(total===1?t.piece:t.pieces)+' '+(filter==='all'?t.across+' '+secs+' '+t.sections:t.inn+' '+CATS[filter].label[LANG])+' · '+LANG.toUpperCase();
    legend.innerHTML='<span class="lv">\u25CF '+t.legendLive+'</span><span>'+t.legendByline+'</span>';
  }
  function applyLang(lang){
    LANG=lang; document.documentElement.lang=lang;
    document.getElementById('kicker').textContent=T[lang].kicker;
    document.getElementById('lead').innerHTML=T[lang].lead;
    document.getElementById('langHint').textContent=T[lang].hint;
    document.getElementById('meta').innerHTML=T[lang].meta.map(function(m){return '<div><span>'+m+'</span></div>';}).join('');
    document.getElementById('footBlurb').textContent=T[lang].foot;
    Array.prototype.forEach.call(document.querySelectorAll('.langbtn'),function(b){b.classList.toggle('active',b.dataset.lang===lang);});
    buildTicker(); buildCats(); render();
  }
  Array.prototype.forEach.call(document.querySelectorAll('.langbtn'),function(b){b.addEventListener('click',function(){applyLang(b.dataset.lang);});});
  applyLang('en');
  setStickyOffset();
</script>
